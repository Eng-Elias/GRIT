services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - PORT=8080
      - CLONE_DIR=/tmp/grit-clones
      - CLONE_SIZE_THRESHOLD_KB=51200
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./grit", "--worker"]
    environment:
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
      - CLONE_DIR=/tmp/grit-clones
      - CLONE_SIZE_THRESHOLD_KB=51200
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-js"]
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
  caddy_data:
  caddy_config:
